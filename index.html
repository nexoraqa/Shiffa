<!DOCTYPE html>
<!--
  📚 LESSON: What is <!DOCTYPE html> ?
  This line tells the browser:
  "Hey! This is an HTML file."
  Always the first line in every HTML file.
-->

<html lang="en">
<!--
  📚 LESSON: What is <html> ?
  This is the ROOT tag.
  Everything in your page goes INSIDE this tag.
  Like the outer walls of a building.
-->

<head>
  <!--
    📚 LESSON: What is <head> ?
    The head is the "brain" of the page.
    The user does NOT see what's inside head.
    But it contains important settings:
    - The page title (shows in browser tab)
    - Links to styles
    - Settings for mobile screens
  -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shifaa 🌿 — Smart Clinic Management</title>

  <style>
    /*
      📚 LESSON: What is <style> ?
      This is CSS — it controls how things LOOK.
      Without CSS, everything is plain black text.
      CSS gives colors, sizes, spacing, fonts.

      Format is always:
      selector { property: value; }

      Example:
      body { background: green; }
      This makes the whole page background green.
    */

    /* ── RESET: remove browser default ugly styles ── */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    /* ── COLORS: our design system ── */
    :root {
      /*
        📚 LESSON: What are CSS variables?
        --primary is a variable (like a nickname for a color).
        Instead of typing #1B6B4A everywhere,
        we write var(--primary).
        Change it once here → changes everywhere!
      */
      --primary:        #1B6B4A;
      --primary-light:  #2D9166;
      --primary-xlight: #E8F5EF;
      --primary-dark:   #134D35;
      --accent:         #F0A500;
      --accent-light:   #FFF8E7;
      --text-dark:      #0F1F17;
      --text-mid:       #4A5E54;
      --text-light:     #8FA89D;
      --bg:             #F7FAF8;
      --white:          #FFFFFF;
      --border:         #D6E8DE;
      --error:          #D64045;
      --error-light:    #FDECEA;
      --purple:         #7B5EA7;
      --purple-light:   #F3EEFF;
      --blue:           #1565C0;
      --blue-light:     #E3F0FF;
      --orange:         #E65100;
      --orange-light:   #FFF3E0;
    }

    /* ── BODY: the whole page ── */
    body {
      background: var(--bg);
      min-height: 100vh;
      color: var(--text-dark);
    }

    /* ── LOGIN PAGE ── */
    #login-page {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--primary-dark), var(--primary), var(--primary-light));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .logo-circle {
      width: 80px;
      height: 80px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin: 0 auto 16px;
      border: 2px solid rgba(255,255,255,0.3);
    }

    .logo-title {
      color: white;
      font-size: 38px;
      font-weight: 900;
      text-align: center;
      letter-spacing: -1px;
    }

    .logo-sub {
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      text-align: center;
      margin: 6px 0 32px;
    }

    /* ── LOGIN CARD ── */
    .login-card {
      background: var(--white);
      border-radius: 20px;
      padding: 32px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }

    .login-card h2 {
      font-size: 22px;
      font-weight: 800;
      color: var(--text-dark);
      margin-bottom: 4px;
    }

    .login-card p {
      font-size: 13px;
      color: var(--text-light);
      margin-bottom: 24px;
    }

    /* ── FORM FIELDS ── */
    .field-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-mid);
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      color: var(--text-dark);
      outline: none;
      transition: border 0.2s;
    }

    input:focus {
      border-color: var(--primary);
    }

    /* ── PASSWORD WRAPPER (for show/hide button) ── */
    .pass-wrap {
      position: relative;
    }

    .pass-wrap input {
      padding-right: 48px;
    }

    .show-pass-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      color: var(--text-light);
    }

    /* ── BUTTONS ── */
    .btn-primary {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }

    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.6; cursor: wait; }

    .btn-secondary {
      background: var(--white);
      color: var(--primary);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-small {
      font-size: 11px;
      background: var(--primary-xlight);
      color: var(--primary);
      border: none;
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      font-weight: 700;
    }

    /* ── ERROR BOX ── */
    .error-box {
      background: var(--error-light);
      border: 1px solid var(--error);
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 16px;
      color: var(--error);
      font-size: 13px;
      font-weight: 500;
      display: none; /* hidden by default */
    }

    /* ── TEST ACCOUNTS BOX ── */
    .test-accounts {
      margin-top: 24px;
      padding: 16px;
      background: var(--bg);
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .test-accounts p {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-mid);
      margin-bottom: 10px;
    }

    .test-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }

    .test-row-info { font-size: 12px; color: var(--text-dark); font-weight: 600; }
    .test-row-user { font-size: 11px; color: var(--text-light); margin-left: 6px; }

    /* ── DASHBOARD ── */
    #dashboard-page { display: none; min-height: 100vh; }

    /* Header */
    .top-header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 8px rgba(0,0,0,0.05);
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-logo-icon {
      width: 38px;
      height: 38px;
      background: var(--primary);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .header-logo-text { font-weight: 800; font-size: 18px; color: var(--text-dark); }
    .header-logo-clinic { font-size: 11px; color: var(--text-light); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-name { font-size: 13px; font-weight: 700; color: var(--text-dark); text-align: right; }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      border: 2px solid var(--border);
    }

    .signout-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-mid);
      cursor: pointer;
    }

    /* Role Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 700;
    }

    .badge-superadmin   { background: var(--purple-light); color: var(--purple); }
    .badge-clinicadmin  { background: var(--primary-xlight); color: var(--primary); }
    .badge-doctor       { background: var(--blue-light); color: var(--blue); }
    .badge-receptionist { background: var(--orange-light); color: var(--orange); }

    /* Layout */
    .dashboard-layout {
      display: flex;
      min-height: calc(100vh - 64px);
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      background: var(--white);
      border-right: 1px solid var(--border);
      padding: 20px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
      border: none;
      border-radius: 10px;
      background: transparent;
      color: var(--text-mid);
      font-weight: 500;
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      border-left: 3px solid transparent;
      transition: all 0.15s;
      width: 100%;
    }

    .nav-btn:hover { background: var(--bg); }

    .nav-btn.active {
      background: var(--primary-xlight);
      color: var(--primary);
      font-weight: 700;
      border-left: 3px solid var(--primary);
    }

    .sidebar-role-info {
      margin-top: auto;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    .sidebar-role-label { font-size: 11px; color: var(--text-light); margin-bottom: 6px; }
    .sidebar-role-desc  { font-size: 11px; color: var(--text-light); margin-top: 8px; }

    /* Main content */
    .main-content { flex: 1; padding: 28px; overflow-y: auto; }

    /* Welcome banner */
    .welcome-banner {
      border-radius: 16px;
      padding: 24px 28px;
      margin-bottom: 24px;
      color: white;
    }

    .welcome-date  { font-size: 13px; opacity: 0.8; margin-bottom: 4px; }
    .welcome-title { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
    .welcome-sub   { font-size: 14px; opacity: 0.8; }

    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--white);
      border-radius: 14px;
      padding: 20px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .stat-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .stat-value { font-size: 26px; font-weight: 800; color: var(--text-dark); }
    .stat-label { font-size: 12px; color: var(--text-light); font-weight: 500; }

    /* Table card */
    .table-card {
      background: var(--white);
      border-radius: 14px;
      border: 1px solid var(--border);
      padding: 20px;
    }

    .table-card h3 { font-size: 15px; color: var(--text-dark); margin-bottom: 16px; }

    .table-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .table-row:last-child { border-bottom: none; }

    .row-name  { font-weight: 600; font-size: 14px; color: var(--text-dark); }
    .row-sub   { font-size: 12px; color: var(--text-light); margin-top: 2px; }

    .status-badge {
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 700;
    }

    /* Type badges */
    .type-new      { background: var(--primary-xlight); color: var(--primary); border-radius: 10px; padding: 1px 8px; font-size: 10px; font-weight: 700; }
    .type-followup { background: var(--purple-light); color: var(--purple); border-radius: 10px; padding: 1px 8px; font-size: 10px; font-weight: 700; }

    /* Footer */
    .footer {
      text-align: center;
      color: rgba(255,255,255,0.45);
      font-size: 12px;
      margin-top: 20px;
    }

    /* ── RESPONSIVE: mobile ── */
    @media (max-width: 640px) {
      .sidebar { display: none; }
      .top-header { padding: 0 16px; }
      .main-content { padding: 16px; }
      .welcome-title { font-size: 18px; }
    }
  </style>
</head>

<body>
<!--
  📚 LESSON: What is <body> ?
  Everything the USER SEES goes inside <body>.
  Text, buttons, images, forms — all here.
-->

<!-- ════════════════════════════════════════
  🚪 LOGIN PAGE
  This div is shown when nobody is logged in.
  It gets hidden when login is successful.
════════════════════════════════════════ -->
<div id="login-page">

  <!-- Logo -->
  <div class="logo-circle">🌿</div>
  <div class="logo-title">Shifaa</div>
  <p class="logo-sub">Smart Clinic Management · شفاء</p>

  <!-- Login Card -->
  <div class="login-card">
    <h2>Welcome back 👋</h2>
    <p>Sign in to your Shifaa account</p>

    <!-- Error message (hidden until needed) -->
    <div class="error-box" id="error-box">⚠️ <span id="error-text"></span></div>

    <!-- Username Field -->
    <div class="field-group">
      <label for="username-input">Username</label>
      <input
        type="text"
        id="username-input"
        placeholder="e.g. dr.karim"
        autocomplete="username"
      />
    </div>

    <!-- Password Field -->
    <div class="field-group">
      <label for="password-input">Password</label>
      <div class="pass-wrap">
        <input
          type="password"
          id="password-input"
          placeholder="••••••••"
          autocomplete="current-password"
        />
        <button class="show-pass-btn" onclick="togglePassword()" title="Show/hide password">👁️</button>
      </div>
    </div>

    <!-- Login Button -->
    <button class="btn-primary" id="login-btn" onclick="handleLogin()">
      Sign In →
    </button>

    <!-- Test Accounts -->
    <div class="test-accounts">
      <p>🧪 Test Accounts — click Use to fill in:</p>

      <div class="test-row">
        <div><span class="test-row-info">👑 Super Admin</span><span class="test-row-user">@admin</span></div>
        <button class="btn-small" onclick="fillLogin('admin','admin123')">Use →</button>
      </div>

      <div class="test-row">
        <div><span class="test-row-info">🏥 Clinic Admin</span><span class="test-row-user">@clinicadmin</span></div>
        <button class="btn-small" onclick="fillLogin('clinicadmin','clinic123')">Use →</button>
      </div>

      <div class="test-row">
        <div><span class="test-row-info">👨‍⚕️ Doctor</span><span class="test-row-user">@dr.karim</span></div>
        <button class="btn-small" onclick="fillLogin('dr.karim','doctor123')">Use →</button>
      </div>

      <div class="test-row">
        <div><span class="test-row-info">🧑‍💼 Receptionist</span><span class="test-row-user">@sara.recep</span></div>
        <button class="btn-small" onclick="fillLogin('sara.recep','recep123')">Use →</button>
      </div>
    </div>
  </div>

  <p class="footer">🇩🇿 Made for Algeria · Shifaa v1.0</p>
</div>


<!-- ════════════════════════════════════════
  🏠 DASHBOARD PAGE
  Hidden at start. Shown after login.
════════════════════════════════════════ -->
<div id="dashboard-page">

  <!-- Top Header -->
  <header class="top-header">
    <div class="header-logo">
      <div class="header-logo-icon">🌿</div>
      <div>
        <div class="header-logo-text">Shifaa</div>
        <div class="header-logo-clinic" id="header-clinic"></div>
      </div>
    </div>
    <div class="header-right">
      <div>
        <div class="user-name" id="header-name"></div>
        <div id="header-badge"></div>
      </div>
      <div class="avatar" id="header-avatar"></div>
      <button class="signout-btn" onclick="handleLogout()">Sign Out</button>
    </div>
  </header>

  <!-- Dashboard Layout -->
  <div class="dashboard-layout">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <!-- Nav buttons injected by JavaScript -->
      <div id="nav-items"></div>

      <!-- Role info -->
      <div class="sidebar-role-info" id="sidebar-role-box">
        <div class="sidebar-role-label">Logged in as</div>
        <div id="sidebar-badge"></div>
        <div class="sidebar-role-desc" id="sidebar-desc"></div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="main-content">
      <!-- Content injected by JavaScript based on role -->
    </main>

  </div>
</div>


<script>
/*
  📚 LESSON: What is <script> ?
  This is JavaScript — it makes the page DO things.
  Without JavaScript, buttons don't work,
  nothing changes when you click.

  JavaScript runs IN the browser.
  No server needed!
*/

// ─────────────────────────────────────────
// 📚 LESSON: Variables
// A variable is a box that stores information.
// const = the box never changes
// let   = the box can change
// ─────────────────────────────────────────

// Our "database" — list of all users
const USERS = [
  { id:"u1", username:"admin",       password:"admin123",  role:"superadmin",   name:"Super Admin",        avatar:"👑" },
  { id:"u2", username:"clinicadmin", password:"clinic123", role:"clinicadmin",  name:"Dr. Mansouri Clinic", avatar:"🏥", clinicName:"El Amal Clinic" },
  { id:"u3", username:"dr.karim",    password:"doctor123", role:"doctor",       name:"Dr. Karim Mansouri", avatar:"👨‍⚕️", clinicName:"El Amal Clinic", specialty:"General Practice" },
  { id:"u4", username:"sara.recep",  password:"recep123",  role:"receptionist", name:"Sara Bouzid",        avatar:"🧑‍💼", clinicName:"El Amal Clinic" },
];

// Who is currently logged in? (null = nobody)
let currentUser = null;

// ─────────────────────────────────────────
// 📚 LESSON: Functions
// A function = a set of steps with a name.
// You "call" it by writing its name + ()
// ─────────────────────────────────────────

// Fill login form when clicking "Use →"
function fillLogin(username, password) {
  document.getElementById('username-input').value = username;
  document.getElementById('password-input').value = password;
  document.getElementById('error-box').style.display = 'none';
}

// Show / hide password
function togglePassword() {
  const input = document.getElementById('password-input');
  const btn   = document.querySelector('.show-pass-btn');
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = '🙈';
  } else {
    input.type = 'password';
    btn.textContent = '👁️';
  }
}

// Show error message
function showError(msg) {
  const box = document.getElementById('error-box');
  document.getElementById('error-text').textContent = msg;
  box.style.display = 'block';
}

// ─────────────────────────────────────────
// MAIN LOGIN FUNCTION
// Called when user clicks "Sign In"
// ─────────────────────────────────────────
function handleLogin() {
  const username = document.getElementById('username-input').value.trim().toLowerCase();
  const password = document.getElementById('password-input').value;
  const btn      = document.getElementById('login-btn');

  // Hide old errors
  document.getElementById('error-box').style.display = 'none';

  // Check empty fields
  if (!username || !password) {
    showError('Please enter your username and password.');
    return;
  }

  // Show loading state
  btn.textContent = 'Signing in...';
  btn.disabled    = true;

  // Simulate server delay (0.8 seconds)
  setTimeout(() => {
    // Search for matching user
    const user = USERS.find(u => u.username === username && u.password === password);

    if (user) {
      currentUser = user;
      showDashboard(user);
    } else {
      showError('Wrong username or password. Try again.');
      btn.textContent = 'Sign In →';
      btn.disabled    = false;
    }
  }, 800);
}

// ─────────────────────────────────────────
// SHOW DASHBOARD after successful login
// ─────────────────────────────────────────
function showDashboard(user) {
  // Hide login, show dashboard
  document.getElementById('login-page').style.display    = 'none';
  document.getElementById('dashboard-page').style.display = 'block';

  // Fill header info
  document.getElementById('header-name').textContent   = user.name;
  document.getElementById('header-avatar').textContent = user.avatar;
  document.getElementById('header-clinic').textContent = user.clinicName || '';
  document.getElementById('header-badge').innerHTML    = makeBadge(user.role);
  document.getElementById('sidebar-badge').innerHTML   = makeBadge(user.role);

  // Role descriptions
  const descs = {
    superadmin:   'Full platform access',
    clinicadmin:  'Clinic-level access',
    doctor:       'Your patients only',
    receptionist: 'Queue management',
  };
  document.getElementById('sidebar-desc').textContent = descs[user.role] || '';

  // Build sidebar nav based on role
  const navs = {
    superadmin:   [['📊','dashboard','Overview'],['🏥','clinics','All Clinics'],['👨‍⚕️','doctors','All Doctors'],['👥','patients','All Patients'],['📈','reports','Reports']],
    clinicadmin:  [['📊','dashboard','Overview'],['👨‍⚕️','doctors','My Doctors'],['👥','patients','Patients'],['📈','reports','Reports']],
    doctor:       [['📊','dashboard','My Dashboard'],['🔢','queue','My Queue'],['👥','patients','My Patients'],['📝','notes','Notes']],
    receptionist: [['📊','dashboard','Overview'],['➕','register','Register Patient'],['🔢','queue','Today\'s Queue']],
  };

  const items = navs[user.role] || navs.receptionist;
  document.getElementById('nav-items').innerHTML = items.map(([icon, id, label]) =>
    `<button class="nav-btn ${id === 'dashboard' ? 'active' : ''}" onclick="setNav('${id}', this)">${icon} ${label}</button>`
  ).join('');

  // Load default dashboard content
  loadContent('dashboard');
}

// ─────────────────────────────────────────
// MAKE ROLE BADGE HTML
// ─────────────────────────────────────────
function makeBadge(role) {
  const config = {
    superadmin:   { cls:'badge-superadmin',   icon:'👑', label:'Super Admin'   },

<!-- ═══════════════════════════════════════════

  Think of it like calling a friend:

<script type="module">

// ── Step 1: Import Firebase tools we need ──
// Like opening a toolbox and picking tools
import { initializeApp }                          from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc,
         getDocs, query, where,
         orderBy, serverTimestamp }               from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, createUserWithEmailAndPassword,
         signInWithEmailAndPassword,
         signOut, onAuthStateChanged }            from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// ── Step 2: YOUR Firebase Keys ──
// 📚 These tell Firebase: "This is Shifaa's project"
// Like your home address — unique to you!

  apiKey:            "AIzaSyBZE7dYhMcwWb7vrXqFGv8uNc1z7I_abc",
  authDomain:        "shiffa-fcae0.firebaseapp.com",
  projectId:         "shiffa-fcae0",
  storageBucket:     "shiffa-fcae0.firebasestorage.app",
  messagingSenderId: "48392150056",
  appId:             "1:48392150056:web:3c89b803c4c82202"
};

// ── Step 3: Start Firebase ──
// Like turning on the engine 🚗
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);   // database
const auth = getAuth(app);       // login system

// ══════════════════════════════════════════
// 📚 LESSON: What is Firestore?
//
// Firestore = your cloud database
// db = our shortcut to reach it
//
// To SAVE something:
//   addDoc(collection(db, "patients"), data)
//   → "add a document to the patients folder"
//
// To GET something:
//   getDocs(collection(db, "patients"))
//   → "get all documents from patients folder"
// ══════════════════════════════════════════

// ─────────────────────────────────────────
// 💾 SAVE PATIENT TO FIREBASE
// Called when receptionist registers patient
// ─────────────────────────────────────────
window.savePatientToFirebase = async function(patientData) {
  try {
    // Add patient to "patients" collection in Firebase
    const docRef = await addDoc(collection(db, "patients"), {
      ...patientData,
      createdAt: serverTimestamp(), // automatic timestamp
      status: "waiting",
      clinicId: "clinic_001",      // will be dynamic later
    });
    console.log("✅ Patient saved! ID:", docRef.id);
    return docRef.id;
  } catch (error) {
    console.error("❌ Error saving patient:", error);
    return null;
  }
}

// ─────────────────────────────────────────
// 📋 GET TODAY'S PATIENTS FROM FIREBASE
// Called when doctor opens their queue
// ─────────────────────────────────────────
window.getTodaysPatients = async function() {
  try {
    const today = new Date().toISOString().split('T')[0];
    const q = query(
      collection(db, "patients"),
      where("visitDate", "==", today),
      orderBy("createdAt")
    );
    const snapshot = await getDocs(q);
    const patients = [];
    snapshot.forEach(doc => {
      patients.push({ id: doc.id, ...doc.data() });
    });
    console.log("✅ Got patients:", patients.length);
    return patients;
  } catch (error) {
    console.error("❌ Error getting patients:", error);
    return [];
  }
}

// ─────────────────────────────────────────
// 🔐 FIREBASE AUTH — Real Login
// This replaces our fake USERS list
// with real Firebase accounts
// ─────────────────────────────────────────
window.firebaseLogin = async function(email, password) {
  try {
    const result = await signInWithEmailAndPassword(auth, email, password);
    console.log("✅ Logged in:", result.user.email);
    return result.user;
  } catch (error) {
    console.error("❌ Login error:", error.message);
    return null;
  }
}

window.firebaseLogout = async function() {
  try {
    await signOut(auth);
    console.log("✅ Logged out");
  } catch (error) {
    console.error("❌ Logout error:", error);
  }
}

// ─────────────────────────────────────────
// 📚 LESSON: What is async/await?
//
// Firebase operations take TIME.
// They go to the internet and come back.
//
// async = "this function takes time"
// await = "wait here until it comes back"
//
// Like ordering food:
// await = "I'll wait for my order"
// Without it = you'd leave before food arrives! 🍕
// ─────────────────────────────────────────

// ── Firebase is ready! ──
console.log("🌿 Shifaa connected to Firebase!");
console.log("📦 Database:", db.app.options.projectId);

// Show connection status on page
const statusDiv = document.createElement('div');
statusDiv.style.cssText = `

`;
statusDiv.innerHTML = '🔥 Firebase Connected!';
document.body.appendChild(statusDiv);

const style = document.createElement('style');
style.textContent = `@keyframes fadeOut { to { opacity: 0; } }`;
document.head.appendChild(style);

setTimeout(() => statusDiv.remove(), 5000);

</script>
